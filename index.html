<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💖 Local Hotties NEED Attention RIGHT NOW! 💖</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ff3366, #ff8800);
      font-family: 'Comic Sans MS', cursive, sans-serif;
      color: white;
      text-align: center;
      overflow: hidden;
    }
    .container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.65);
      padding: 45px 70px;
      border-radius: 30px;
      box-shadow: 0 0 50px rgba(0,0,0,0.8);
      max-width: 90%;
    }
    h1 {
      font-size: 4rem;
      margin: 0 0 25px;
      text-shadow: 5px 5px 12px #000;
      line-height: 1.05;
    }
    .subtitle {
      font-size: 2.1rem;
      margin: 0 0 35px;
      color: #ffff66;
    }
    .big-button {
      display: inline-block;
      background: #00ff44;
      color: black;
      font-size: 2.8rem;
      font-weight: bold;
      padding: 30px 90px;
      border: 10px solid #ff0000;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 12px 0 #006600, 0 18px 35px rgba(0,0,0,0.6);
      transition: all 0.18s;
      user-select: none;
    }
    .big-button:active {
      transform: translateY(8px);
      box-shadow: 0 4px 0 #006600, 0 10px 25px rgba(0,0,0,0.6);
    }
    .small-print {
      margin-top: 45px;
      font-size: 1.2rem;
      opacity: 0.85;
    }
    .hearts {
      position: absolute;
      font-size: 5rem;
      pointer-events: none;
      animation: float 14s infinite linear;
      opacity: 0.75;
    }
    @keyframes float {
      0%   { transform: translateY(110vh) rotate(0deg); }
      100% { transform: translateY(-160vh) rotate(1080deg); }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Desperate Singles<br>Waiting For YOU Nearby!</h1>
    <div class="subtitle">Thousands of matches just 1 click away 😏🔥</div>
    
    <div class="big-button" id="fartButton">
      CLICK HERE FOR MORE!
    </div>

    <div class="small-print">
      *18+ only. No guarantees of actual dates. May cause ear damage, shame, or uncontrollable laughter.<br>
      Void where prohibited. Proceed at your own risk, hero.
    </div>
  </div>

  <!-- Floating hearts of doom -->
  <div class="hearts" style="left:8%; animation-duration:10s;">💖</div>
  <div class="hearts" style="left:22%; animation-duration:15s; animation-delay:1.5s;">😘</div>
  <div class="hearts" style="left:38%; animation-duration:12s; animation-delay:3s;">💋</div>
  <div class="hearts" style="left:55%; animation-duration:16s; animation-delay:0.8s;">❤️</div>
  <div class="hearts" style="left:72%; animation-duration:11s; animation-delay:4s;">💕</div>
  <div class="hearts" style="left:88%; animation-duration:13s; animation-delay:2.2s;">😍</div>

  <!-- Classic reverb fart – the good stuff -->
  <audio id="fart" preload="auto">
    <source src="https://www.myinstants.com/media/sounds/fart-with-reverb.mp3" type="audio/mpeg">
    <!-- Very short fallback base64 silence just in case -->
    <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=" type="audio/wav">
  </audio>

  <script>
    const button = document.getElementById('fartButton');
    const fart = document.getElementById('fart');
    
    let clickCount = 0;

    button.addEventListener('click', () => {
      fart.currentTime = 0;
      fart.play().catch(e => console.log("Audio play failed (browser policy?):", e));
      
      clickCount++;
      if (clickCount >= 3 && Math.random() < 0.4) {
        button.textContent = "STOP IT YOU WEIRDO!! 💨";
        button.style.background = "#ff2222";
        button.style.borderColor = "#ffff00";
      } else if (clickCount >= 6) {
        button.textContent = "YOU'RE ADDICTED TO FARTS NOW?!";
        button.style.background = "#aa00ff";
      }
    });
  </script>

</body>
</html>
